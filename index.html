<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTCUSD.cc - Predict the Bitcoin Price</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 20px;
            width: 90%;
        }
        h1 { color: #f2a900; font-size: 2.5rem; margin-bottom: 5px; }
        p { color: #8b949e; font-size: 1.1rem; line-height: 1.5; margin-bottom: 25px; }
        
        .price-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
        }
        .price-label { color: #8b949e; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .price-value { color: #238636; font-size: 2rem; font-weight: bold; margin-top: 5px; }

        form {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            outline: none;
        }
        input:focus { border-color: #f2a900; }
        
        button {
            background-color: #f2a900;
            color: #0d1117;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:hover { transform: scale(1.02); }
        button:disabled { background-color: #30363d; color: #8b949e; cursor: not-allowed; }
        
        .locked-message {
            background: #211b16;
            border: 1px solid #f2a900;
            color: #f2a900;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            display: none;
        }

        #payment-box {
            display: none;
            background: #161b22;
            border: 1px solid #f2a900;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        #qrcode-img {
            margin: 15px auto;
            display: block;
            border: 8px solid white;
            border-radius: 8px;
        }
        .pay-status {
            color: #238636;
            font-weight: bold;
            margin-top: 10px;
        }
        .error-msg {
            color: #f85149;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BTCUSD.cc</h1>
        <p>Can you accurately predict the weekly close of Bitcoin?</p>
        
        <div class="price-box">
            <div class="price-label">Live Bitcoin Price</div>
            <div class="price-value" id="btc-price">Loading...</div>
        </div>
        
        <div id="locked-box" class="locked-message">
            🔒 Weekend Lock! Predictions are closed. Next round opens on Monday.
        </div>

        <form id="prediction-form" onsubmit="handlePredictionSubmit(event)">
            <input type="text" id="username" placeholder="Choose a Nickname" required>
            <input type="number" id="price_prediction" placeholder="Your BTC price prediction (USD)" step="0.01" required>
            <input type="text" id="btc_address" placeholder="Your BTC Address (for potential payout)" required>
            <input type="email" id="email" placeholder="Your Email (optional, for win notification)">
            <button type="submit" id="submit-btn">Pay Entry Fee & Submit</button>
        </form>

        <div id="payment-box">
            <h3 id="payment-title">⚡ Pay Entry Fee</h3>
            <p style="font-size: 0.9rem; color: #8b949e;">Scan with Blink or any Lightning wallet to lock in your tip:</p>
            
            <img id="qrcode-img" src="" alt="Lightning QR Code" width="200" height="200">
            
            <p class="pay-status" id="payment-status">⏳ Waiting for Lightning payment...</p>
            <div class="error-msg" id="error-status"></div>
        </div>
    </div>

    <script>
        // =========================================================
        // ⚙️ HLAVNÍ NASTAVENÍ (ZDE MĚŇ HODNOTU V SATOSHI)
        // =========================================================
        const ENTRY_FEE_SATS = 23; // 👈 Změň toto číslo na libovolnou hodnotu!
        const LIGHTNING_ADDRESS = "btcusdcc@blink.sv";
        
        const SUPABASE_URL = "https://euizdmlikpncmqwkfmhn.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1aXpkbWxpa3BuY21xd2tmbWhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNDkzMzksImV4cCI6MjA5OTYyNTMzOX0.QyaAWkMPOAd9cd0ZHifXCiuwGvPEQomO5yG30TzWFRA"; 

        let paymentCheckInterval = null;

        // Dynamické nastavení textů podle ceny v Satoshi
        function updateUIWithSatoshiPrice() {
            const submitBtn = document.getElementById('submit-btn');
            const paymentTitle = document.getElementById('payment-title');
            
            if (submitBtn) submitBtn.innerText = `Pay ${ENTRY_FEE_SATS} Sats & Submit`;
            if (paymentTitle) paymentTitle.innerText = `⚡ Pay Entry Fee (${ENTRY_FEE_SATS} Sats)`;
        }

        function getWeekIdentifier() {
            const now = new Date();
            const oneJan = new Date(now.getFullYear(), 0, 1);
            const numberOfDays = Math.floor((now - oneJan) / (24 * 60 * 60 * 1000));
            const weekNumber = Math.ceil((now.getDay() + 1 + numberOfDays) / 7);
            return `${now.getFullYear()}-W${weekNumber}`;
        }

        function checkIfLocked() {
            const now = new Date();
            const utcDay = now.getUTCDay(); 
            const utcHours = now.getUTCHours();
            
            let isLocked = false;
            if (utcDay === 6 || utcDay === 0) {
                isLocked = true; 
            } else if (utcDay === 5 && utcHours >= 23) {
                isLocked = true; 
            }
            
            if (isLocked) {
                document.getElementById('prediction-form').style.display = 'none';
                document.getElementById('locked-box').style.display = 'block';
            }
        }

        async function fetchBitcoinPrice() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const data = await response.json();
                const price = parseFloat(data.price).toFixed(2);
                document.getElementById('btc-price').innerText = '$' + Number(price).toLocaleString('en-US', {minimumFractionDigits: 2});
            } catch (error) {
                document.getElementById('btc-price').innerText = 'Error loading price';
            }
        }

        async function handlePredictionSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const paymentBox = document.getElementById('payment-box');
            const errorStatus = document.getElementById('error-status');
            
            errorStatus.innerText = "";
            submitBtn.disabled = true;
            submitBtn.innerText = 'Generating Invoice...';

            try {
                // 1. LNURL požadavek
                const [user, domain] = LIGHTNING_ADDRESS.split("@");
                const lnurlUrl = `https://${domain}/.well-known/lnurlp/${user}`;
                
                const res = await fetch(lnurlUrl);
                if (!res.ok) throw new Error("Could not reach Blink LNURL server");
                
                const lnurlData = await res.json();

                // 2. Vytvoření faktury na dynamickou částku
                const amountMSats = ENTRY_FEE_SATS * 1000;
                const callbackUrl = `${lnurlData.callback}?amount=${amountMSats}`;
                
                const invoiceRes = await fetch(callbackUrl);
                if (!invoiceRes.ok) throw new Error("Could not request invoice from Blink");
                
                const invoiceData = await invoiceRes.json();

                if (!invoiceData.pr) throw new Error("No payment request returned");

                // 3. Generování QR kódu
                const qrImg = document.getElementById('qrcode-img');
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(invoiceData.pr)}`;

                paymentBox.style.display = 'block';
                document.getElementById('payment-status').innerText = '⏳ Waiting for Lightning payment...';

                // 4. Kontrola platby na pozadí
                if (invoiceData.verify) {
                    startPaymentVerification(invoiceData.verify, event.target);
                } else {
                    errorStatus.innerText = "Warning: Verification link not provided by wallet.";
                }

            } catch (error) {
                console.error("Payment error:", error);
                errorStatus.innerText = "Error generating QR: " + error.message;
                alert("Failed to generate Lightning Invoice.");
                submitBtn.disabled = false;
                submitBtn.innerText = `Pay ${ENTRY_FEE_SATS} Sats & Submit`;
            }
        }

        function startPaymentVerification(verifyUrl, formElement) {
            if (paymentCheckInterval) clearInterval(paymentCheckInterval);

            paymentCheckInterval = setInterval(async () => {
                try {
                    const res = await fetch(verifyUrl);
                    const data = await res.json();

                    if (data.settled) {
                        clearInterval(paymentCheckInterval);
                        document.getElementById('payment-status').innerText = '✅ Payment received! Saving prediction...';
                        
                        await saveToSupabase(formElement);
                    }
                } catch (e) {
                    // Čekáme na zaplacení...
                }
            }, 2500);
        }

        async function saveToSupabase(form) {
            const username = form.querySelector('#username').value;
            const predictionValue = form.querySelector('#price_prediction').value;
            const btc_address = form.querySelector('#btc_address').value;
            const emailInput = form.querySelector('#email');
            const email = emailInput && emailInput.value ? emailInput.value : null;
            const week_id = getWeekIdentifier();

            const payload = {
                username: username,
                price_prediction: parseFloat(predictionValue),
                btc_address: btc_address,
                email: email,
                week_id: week_id
            };

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/predictions`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('🎉 Payment confirmed & prediction locked in! Good luck! 🚀');
                    form.reset();
                    document.getElementById('payment-box').style.display = 'none';
                } else {
                    const errorText = await response.text();
                    alert(`Database Error (${response.status}): ${errorText}`);
                }
            } catch (error) {
                alert('Database connection failed: ' + error.message);
            } finally {
                const submitBtn = document.getElementById('submit-btn');
                submitBtn.disabled = false;
                submitBtn.innerText = `Pay ${ENTRY_FEE_SATS} Sats & Submit`;
            }
        }

        // Init
        updateUIWithSatoshiPrice();
        fetchBitcoinPrice();
        setInterval(fetchBitcoinPrice, 5000);
        checkIfLocked();
    </script>
</body>
</html>
