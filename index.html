<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTCUSD.cc - Predict the Bitcoin Price</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 20px;
            width: 90%;
        }
        h1 { color: #f2a900; font-size: 2.5rem; margin-bottom: 5px; }
        p { color: #8b949e; font-size: 1.1rem; line-height: 1.5; margin-bottom: 25px; }
        
        .price-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
        }
        .price-label { color: #8b949e; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .price-value { color: #238636; font-size: 2rem; font-weight: bold; margin-top: 5px; }

        form {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            outline: none;
        }
        input:focus { border-color: #f2a900; }
        
        button {
            background-color: #f2a900;
            color: #0d1117;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:hover { transform: scale(1.02); }
        button:disabled { background-color: #30363d; color: #8b949e; cursor: not-allowed; }
        
        .locked-message {
            background: #211b16;
            border: 1px solid #f2a900;
            color: #f2a900;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BTCUSD.cc</h1>
        <p>Can you accurately predict the weekly close of Bitcoin?</p>
        
        <div class="price-box">
            <div class="price-label">Live Bitcoin Price</div>
            <div class="price-value" id="btc-price">Loading...</div>
        </div>
        
        <div id="locked-box" class="locked-message">
            🔒 Weekend Lock! Predictions are closed. Next round opens on Monday.
        </div>

        <form id="prediction-form" onsubmit="submitPrediction(event)">
            <input type="text" id="username" placeholder="Choose a Nickname" required>
            <input type="number" id="price_prediction" placeholder="Your BTC price prediction (USD)" step="0.01" required>
            <input type="text" id="btc_address" placeholder="Your BTC Address (for potential payout)" required>
            <input type="email" id="email" placeholder="Your Email (optional, for win notification)">
            <button type="submit" id="submit-btn">Submit Prediction</button>
        </form>
    </div>

    <script>
        // === NASTAVENÍ SUPABASE (Doplň své údaje sem) ===
        const SUPABASE_URL = "https://euizdmlikpncmqwkfmhn.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1aXpkbWxpa3BuY21xd2tmbWhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNDkzMzksImV4cCI6MjA5OTYyNTMzOX0.QyaAWkMPOAd9cd0ZHifXCiuwGvPEQomO5yG30TzWFRA"; 

        // Funkce pro získání kódu aktuálního týdne (např. 2026-W29)
        function getWeekIdentifier() {
            const now = new Date();
            const oneJan = new Date(now.getFullYear(), 0, 1);
            const numberOfDays = Math.floor((now - oneJan) / (24 * 60 * 60 * 1000));
            const weekNumber = Math.ceil((now.getDay() + 1 + numberOfDays) / 7);
            return `${now.getFullYear()}-W${weekNumber}`;
        }

        // Kontrola, zda je víkend (v pátek po 23:59 UTC do neděle 23:59 UTC)
        function checkIfLocked() {
            const now = new Date();
            const utcDay = now.getUTCDay(); // 0 = neděle, 5 = pátek, 6 = sobota
            const utcHours = now.getUTCHours();
            
            let isLocked = false;
            
            if (utcDay === 6 || utcDay === 0) {
                isLocked = true; // Celá sobota a neděle
            } else if (utcDay === 5 && utcHours >= 23) {
                isLocked = true; // Pátek od 23:00 UTC (cca půlnoc)
            }
            
            if (isLocked) {
                document.getElementById('prediction-form').style.display = 'none';
                document.getElementById('locked-box').style.display = 'block';
            }
        }

        // Načítání ceny BTC z Binance
        async function fetchBitcoinPrice() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const data = await response.json();
                const price = parseFloat(data.price).toFixed(2);
                document.getElementById('btc-price').innerText = '$' + Number(price).toLocaleString('en-US', {minimumFractionDigits: 2});
            } catch (error) {
                document.getElementById('btc-price').innerText = 'Error loading price';
            }
        }

        // Odeslání dat do Supabase
        async function submitPrediction(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Sending...';

            const username = document.getElementById('username').value;
            const prediction = parseFloat(document.getElementById('price_prediction').value);
            const btc_address = document.getElementById('btc_address').value;
            const email = document.getElementById('email').value || null;
            const week_id = getWeekIdentifier();

            const payload = {
                username: username,
                price_prediction: price_prediction,
                btc_address: btc_address,
                email: email,
                week_id: week_id
            };

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/predictions`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('Prediction successfully locked in! Good luck! 🚀');
                    document.getElementById('prediction-form').reset();
                } else {
                    const errData = await response.json();
                    alert('Error: ' + errData.message);
                }
            } catch (error) {
                alert('Database connection failed. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit Prediction';
            }
        }

        // Spuštění po načtení
        fetchBitcoinPrice();
        setInterval(fetchBitcoinPrice, 5000);
        checkIfLocked();
    </script>
</body>
</html>
