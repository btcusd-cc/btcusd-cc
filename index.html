<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTCUSD.cc - Predict the Bitcoin Price</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 20px;
        }
        h1 { color: #f2a900; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #8b949e; font-size: 1.1rem; line-height: 1.5; }
        input[type="number"] {
            background: #161b22;
            border: 2px solid #30363d;
            color: white;
            padding: 12px;
            font-size: 1.2rem;
            border-radius: 8px;
            width: 80%;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
        }
        input[type="number"]:focus {
            border-color: #f2a900;
        }
        button {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #2ea043; }
    </style>
</head>
<body>

    <div class="container">
        <h1>BTCUSD.cc</h1>
        <p>Can you accurately predict the price of Bitcoin?<br>The game is launching soon.</p>
        
        <input type="number" placeholder="Enter your price target in USD">
        <br>
        <button onclick="alert('Great guess! The game is launching very soon.')">Submit Guess</button>
    </div>

</body>
</html>
